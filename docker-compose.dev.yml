services:
  reverseProxy:
    container_name: gradeview-reverse-proxy
    image: ${CI_REGISTRY_IMAGE:-gradeview}/reverse-proxy:${REVERSE_PROXY_VERSION:-development}
    build: ./reverseProxy
    env_file:
      - .env
    volumes:
      - ${SOCKETS_DIR:-/dev/null}:/run/sockets
    environment:
      - REVERSE_PROXY_LISTEN=${REVERSE_PROXY_LISTEN:-0.0.0.0:80}
    networks:
      - frontend
    ports:
      - 80:80
    depends_on:
      - web
      - api
      - gradesync
  web:
    container_name: gradeview-web
    image: ${CI_REGISTRY_IMAGE:-gradeview}/web:${WEB_VERSION:-development}
    build:
      context: ./website
      dockerfile: ./server/Dockerfile
    env_file:
      - .env
    volumes:
      - ./website:/website
      - /website/node_modules
      - /website/server/node_modules
    environment:
      - REACT_APP_PROXY_SERVER=${REACT_APP_PROXY_SERVER:-http://gradeview-api:8000}
      - PORT=${REACT_APP_PORT:-3000}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - frontend
    ports:
      - "3000:3000"
    command: npm run react
    restart: unless-stopped
  
  cloud-sql-proxy:
    container_name: gradeview-cloud-sql-proxy
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.2
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "--credentials-file=/secrets/key.json"
      - "${INSTANCE_CONNECTION_NAME}"
    volumes:
      - ./secrets/key.json:/secrets/key.json:ro
    env_file:
      - .env
    ports:
      - "5433:5432"
    networks:
      - frontend
      - db # 确保 proxy 也在 db 网络中
    restart: always

  api:
    container_name: gradeview-api
    image: ${CI_REGISTRY_IMAGE:-gradeview}/server:${API_VERSION:-development}
    build: ./api
    volumes:
      - ./api:/api
      - /api/node_modules
    environment:
      - PORT=${API_PORT}
      - NODE_ENV=production
      - POSTGRES_HOST=cloud-sql-proxy
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - GRADESYNC_DATABASE_URL=
    env_file:
      - .env
    networks:
      - frontend
      - db
    command: npm run dev
    restart: unless-stopped
  gradesync:
    container_name: gradeview-gradesync
    build: ./gradesync
    env_file:
      - .env
    volumes:
      - ./gradesync:/app
    environment:
      - POSTGRES_HOST=cloud-sql-proxy
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cloud-sql-proxy:5432/${POSTGRES_DB}
    networks:
      - frontend
      - db
    ports:
      - "8001:8000"
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped

networks:
  frontend:
    name: frontend
  db:
    name: db
