services:
  reverseProxy:
    container_name: gradeview-reverse-proxy
    image: ${CI_REGISTRY_IMAGE:-gradeview}/reverse-proxy:${REVERSE_PROXY_VERSION:-development}
    build: ./reverseProxy
    volumes:
      - ${SOCKETS_DIR:-/dev/null}:/run/sockets
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - frontend
    ports:
      - 80:80
      - 443:443
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
  web:
    container_name: gradeview-web
    image: ${CI_REGISTRY_IMAGE:-gradeview}/web:${WEB_VERSION:-development}
    build:
      context: ./website
      dockerfile: ./server/Dockerfile
    env_file:
      - .env
    environment:
      - REACT_APP_PROXY_SERVER=${REACT_APP_PROXY_SERVER}
      - PORT=${REACT_APP_PORT}
    networks:
      - frontend
    command: npm start
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${REACT_APP_PORT:-3000}/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
  api:
    container_name: gradeview-api
    image: ${CI_REGISTRY_IMAGE:-gradeview}/server:${API_VERSION:-development}
    build: ./api
    volumes:
    env_file:
      - .env
    environment:
      - PORT=${API_PORT}
      - NODE_ENV=production
    networks:
      - frontend
      - db
    command: npm start
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-8000}/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
  gradesync:
    container_name: gradeview-gradesync
    image: ${CI_REGISTRY_IMAGE:-gradeview}/gradesync:${GRADESYNC_VERSION:-development}
    build: ./gradesync
    volumes:
    env_file:
      - .env
    environment:
      - DATABASE_URL=${GRADESYNC_DATABASE_URL}
    networks:
      - frontend
      - db
    ports:
      - "8001:8000"
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5)"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

networks:
  frontend:
    name: frontend
  db:
    name: db
