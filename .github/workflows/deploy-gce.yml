name: Deploy to GCE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy on GCE VM
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy latest commit to VM
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ZONE: ${{ secrets.GCP_ZONE }}
          GCE_INSTANCE: ${{ secrets.GCE_INSTANCE }}
          GCE_SSH_USER: ${{ secrets.GCE_SSH_USER }}
        run: |
          gcloud compute ssh "$GCE_SSH_USER@$GCE_INSTANCE" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_ZONE" \
            --command "
              set -e
              sudo chown -R \$USER:\$USER /home/gradeview
              git config --global --add safe.directory /home/gradeview/Grades
              cd /home/gradeview/Grades

              mkdir -p ~/.ssh
              chmod 700 ~/.ssh
              touch ~/.ssh/known_hosts
              chmod 600 ~/.ssh/known_hosts
              ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

              KEY_FILE=''
              if [ -f ~/.ssh/id_ed25519 ]; then
                KEY_FILE=~/.ssh/id_ed25519
              elif [ -f ~/.ssh/id_rsa ]; then
                KEY_FILE=~/.ssh/id_rsa
              fi

              if [ -z "$KEY_FILE" ]; then
                echo '[ERROR] No SSH private key found for GitHub access. Expected ~/.ssh/id_ed25519 or ~/.ssh/id_rsa.'
                ls -la ~/.ssh || true
                exit 1
              fi

              chmod 600 "$KEY_FILE" || true
              export GIT_SSH_COMMAND="ssh -i $KEY_FILE -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
              git remote set-url origin git@github.com:AFA-Tooling/Gradeview-new.git
              git fetch --all --prune
              git checkout -B main origin/main
              git reset --hard origin/main
              # Minimal, idempotent cleanup
              sudo docker-compose -f docker-compose.yml down --remove-orphans || true
              sudo docker rm -f gradeview-api gradeview-web gradeview-gradesync gradeview-reverse-proxy 2>/dev/null || true
              sudo docker builder prune -af || true
              sudo docker image prune -af || true
              sudo docker container prune -f || true

              # Recreate services from latest commit
              sudo docker-compose -f docker-compose.yml up -d --build --force-recreate --remove-orphans
            "
