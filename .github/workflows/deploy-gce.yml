name: Deploy to GCE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push-images:
    name: Build and Push Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image namespace
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push reverse proxy image
        uses: docker/build-push-action@v6
        with:
          context: ./reverseProxy
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gradeview/reverse-proxy:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/gradeview/reverse-proxy:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gradeview/web:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/gradeview/web:latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gradeview/server:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/gradeview/server:latest

      - name: Build and push gradesync image
        uses: docker/build-push-action@v6
        with:
          context: ./gradesync
          file: ./gradesync/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gradeview/gradesync:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/gradeview/gradesync:latest

  deploy:
    name: Deploy on GCE VM
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build-and-push-images

    permissions:
      contents: read
      id-token: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image namespace
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync latest docker-compose to VM
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ZONE: ${{ secrets.GCP_ZONE }}
          GCE_INSTANCE: ${{ secrets.GCE_INSTANCE }}
          GCE_SSH_USER: ${{ secrets.GCE_SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_DIR="${DEPLOY_DIR:-/home/gradeview/Grades}"

          gcloud compute scp docker-compose.yml "$GCE_SSH_USER@$GCE_INSTANCE:/tmp/gradeview-docker-compose.yml" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_ZONE"

          gcloud compute ssh "$GCE_SSH_USER@$GCE_INSTANCE" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_ZONE" \
            --command "TARGET_DIR='$TARGET_DIR' GCE_SSH_USER='$GCE_SSH_USER' bash -se" <<'REMOTE'
              set -euo pipefail
              sudo mkdir -p "$TARGET_DIR"
              sudo mv /tmp/gradeview-docker-compose.yml "$TARGET_DIR/docker-compose.yml"
              sudo chown "$GCE_SSH_USER":"$GCE_SSH_USER" "$TARGET_DIR/docker-compose.yml"
          REMOTE

      - name: Deploy latest commit to VM
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ZONE: ${{ secrets.GCP_ZONE }}
          GCE_INSTANCE: ${{ secrets.GCE_INSTANCE }}
          GCE_SSH_USER: ${{ secrets.GCE_SSH_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          IMAGE_REGISTRY: ghcr.io/${{ env.OWNER_LC }}/gradeview
          IMAGE_TAG: ${{ github.sha }}
        run: |
          gcloud compute ssh "$GCE_SSH_USER@$GCE_INSTANCE" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_ZONE" \
            --command "IMAGE_REGISTRY='$IMAGE_REGISTRY' IMAGE_TAG='$IMAGE_TAG' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' DEPLOY_DIR='$DEPLOY_DIR' GCE_SSH_USER='$GCE_SSH_USER' bash -se" <<'REMOTE'
              set -euo pipefail

              DEPLOY_DIR="${DEPLOY_DIR:-/home/gradeview/Grades}"
              echo "[INFO] Using deploy directory: $DEPLOY_DIR"
              if [ ! -f "$DEPLOY_DIR/docker-compose.yml" ]; then
                echo "[ERROR] docker-compose.yml not found in $DEPLOY_DIR"
                exit 1
              fi

              sudo mkdir -p "$DEPLOY_DIR"
              sudo chown -R "$GCE_SSH_USER":"$GCE_SSH_USER" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"

              if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
                echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
              else
                echo '[WARN] GHCR credentials not provided; proceeding without docker login.'
              fi

              STATE_FILE="$DEPLOY_DIR/.gradeview_last_successful_tag"
              PREVIOUS_TAG=''
              if [ -f "$STATE_FILE" ]; then
                PREVIOUS_TAG=$(cat "$STATE_FILE")
              fi

              set_compose_versions() {
                local tag="$1"
                export CI_REGISTRY_IMAGE="$IMAGE_REGISTRY"
                export REVERSE_PROXY_VERSION="$tag"
                export WEB_VERSION="$tag"
                export API_VERSION="$tag"
                export GRADESYNC_VERSION="$tag"
              }

              wait_for_health() {
                local max_wait="${1:-180}"
                local elapsed=0
                local interval=6
                local containers="gradeview-api gradeview-web gradeview-gradesync gradeview-reverse-proxy"

                while [ "$elapsed" -lt "$max_wait" ]; do
                  local all_healthy=true
                  for c in $containers; do
                    local status
                    status=$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$c" 2>/dev/null || echo missing)
                    if [ "$status" != "healthy" ]; then
                      all_healthy=false
                      break
                    fi
                  done

                  if [ "$all_healthy" = true ]; then
                    return 0
                  fi

                  sleep "$interval"
                  elapsed=$((elapsed + interval))
                done

                return 1
              }

              echo "[INFO] Deploying tag $IMAGE_TAG"
              set_compose_versions "$IMAGE_TAG"
              sudo -E docker compose -f docker-compose.yml pull
              sudo -E docker compose -f docker-compose.yml up -d --no-build --remove-orphans

              if wait_for_health 240; then
                printf '%s' "$IMAGE_TAG" | sudo tee "$STATE_FILE" >/dev/null
                sudo chown "$GCE_SSH_USER":"$GCE_SSH_USER" "$STATE_FILE"
                echo "[INFO] Deploy successful. Recorded tag: $IMAGE_TAG"
                sudo docker image prune -f || true
                exit 0
              fi

              echo '[ERROR] New deployment did not become healthy in time.'

              if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "$IMAGE_TAG" ]; then
                echo "[WARN] Rolling back to previous successful tag: $PREVIOUS_TAG"
                set_compose_versions "$PREVIOUS_TAG"
                sudo -E docker compose -f docker-compose.yml pull
                sudo -E docker compose -f docker-compose.yml up -d --no-build --remove-orphans

                if wait_for_health 180; then
                  echo "[INFO] Rollback successful to tag: $PREVIOUS_TAG"
                else
                  echo '[ERROR] Rollback completed but services are still not healthy.'
                fi
              else
                echo '[WARN] No previous successful tag found; rollback skipped.'
              fi

              exit 1
          REMOTE
